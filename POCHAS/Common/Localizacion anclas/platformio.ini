; Beacon/calibrator firmware for Makerfabs ESP32 UWB boards.
; It creates a WiFi AP with a small web UI and uses UWB ranging to register
; anchor coordinates one by one.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 921600
lib_extra_dirs = ../Tag_Serial_two_tags/lib

; Uncomment and adjust these if PlatformIO does not auto-detect your board.
; upload_port = COM8
; monitor_port = COM8

build_flags =
    -D BEACON_UWB_ID=250
    -D ORIGIN_ANCHOR_ID=1
